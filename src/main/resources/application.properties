server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false
server.error.include-message=always

# LAB04S01 - E-MAIL REAL AUTOMATICO PROFESSOR/ALUNO
# Frontend preservado: o professor envia moedas e o sistema busca automaticamente
# professor.email e aluno.email já cadastrados no banco.
#
# Destinatário pode ser qualquer e-mail: Gmail, Hotmail, Outlook, Yahoo,
# institucional etc. Quem precisa de autenticação SMTP é apenas o REMETENTE.
#
# Configuração recomendada por variáveis de ambiente:
# APP_EMAIL_ENVIO_REAL=true
# MAIL_USERNAME=email_remetente_real@gmail.com
# MAIL_PASSWORD=senha_de_app_ou_token_smtp
# MAIL_FROM=email_remetente_real@gmail.com
#
# MAIL_HOST pode ficar como auto. O sistema detecta por domínio do remetente:
# gmail -> smtp.gmail.com | hotmail/outlook/live -> smtp.office365.com
# yahoo -> smtp.mail.yahoo.com | outros -> smtp.<dominio>
app.email.envio-real=${APP_EMAIL_ENVIO_REAL:true}
app.email.exigir-envio-real=${APP_EMAIL_EXIGIR_ENVIO_REAL:false}
app.email.nome-remetente=Sistema de Moeda Estudantil
app.email.remetente=${MAIL_FROM:${MAIL_USERNAME:}}

spring.mail.host=${MAIL_HOST:auto}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# LAB04S01 - RABBITMQ PARA ENVIO ASSINCRONO DE EMAILS
# O envio de moedas publica duas mensagens na fila: uma para o aluno e outra para o professor.
# O consumer EmailRabbitConsumer consome a fila e chama EmailService para registrar/enviar o e-mail real.
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.default-requeue-rejected=false
app.rabbitmq.email.exchange=moeda.email.exchange
app.rabbitmq.email.queue=moeda.email.queue
app.rabbitmq.email.routing-key=moeda.email.enviar
