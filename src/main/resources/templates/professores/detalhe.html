<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Detalhe do Professor</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="app-shell"><aside class="sidebar"><div class="brand"><img src="/logo-sistema.svg"><div><strong>MOEDA</strong><span>ESTUDANTIL</span></div></div><a class="nav-link" href="/home">⌂ Dashboard</a><a class="nav-link active" href="/professores">👨‍🏫 Professores</a></aside><main class="main"><section class="content"><div class="page-header"><div class="page-icon">👨‍🏫</div><div><h1>Detalhe do Professor</h1></div></div><div class="card"><dl class="detail-list"><dt>Nome</dt><dd th:text="${professor.nome}"></dd><dt>CPF</dt><dd th:text="${professor.cpf}"></dd><dt>Departamento</dt><dd th:text="${professor.departamento}"></dd><dt>Instituição</dt><dd th:text="${professor.instituicao}"></dd><dt>Saldo</dt><dd th:text="${professor.saldoMoedas}"></dd><dt>Login</dt><dd th:text="${professor.usuario.login}"></dd></dl><div class="footer-actions"><a class="btn btn-success" th:href="@{/professores/editar/{id}(id=${professor.id})}">Editar</a><a class="btn btn-primary" th:href="@{/moedas/extrato-professor/{id}(id=${professor.id})}">Extrato</a><a class="btn btn-secondary" href="/professores">Voltar</a></div></div></section></main></div></body></html>
