<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empresas Parceiras | Moeda Estudantil</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <img src="/logo-sistema.svg" alt="Moeda Estudantil">
      <div><strong>MOEDA</strong><span>ESTUDANTIL</span></div>
    </div>

    <div class="menu-title">Principal</div>
    <a class="nav-link" href="/home">⌂ Dashboard</a>

    <div class="menu-title">Cadastros</div>
    <a class="nav-link" href="/alunos">👥 Alunos</a>
    <a class="nav-link active" href="/empresas">▦ Empresas Parceiras</a>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="round-menu">☰</div>
      <div class="user-area">
        <div class="user-profile">
          <span th:text="${session.usuarioLogado != null ? session.usuarioLogado.nomeExibicao : 'Administrador'}">Administrador</span>
          <a href="/logout" class="btn btn-secondary btn-sair">Sair</a>
        </div>
      </div>
    </header>

    <section class="content">
      <div class="page-header">
        <div class="page-icon">▦</div>
        <div>
          <h1>Empresas Parceiras</h1>
          <div class="breadcrumb">Dashboard › <span>Empresas Parceiras</span></div>
        </div>
      </div>
      <main class="page"><div class="card"><h1>Detalhe da empresa parceira</h1><dl class="detail-list"><dt>Razão social</dt><dd th:text="${empresa.razaoSocial}"></dd><dt>Nome fantasia</dt><dd th:text="${empresa.nomeFantasia}"></dd><dt>CNPJ</dt><dd th:text="${empresa.cnpj}"></dd><dt>Email</dt><dd th:text="${empresa.email}"></dd><dt>Telefone</dt><dd th:text="${empresa.telefone}"></dd><dt>Endereço</dt><dd th:text="${empresa.endereco}"></dd><dt>Vantagem</dt><dd th:text="${empresa.descricaoVantagem}"></dd><dt>Custo</dt><dd th:text="${empresa.custoMoedas}"></dd><dt>Login</dt><dd th:text="${empresa.usuario.login}"></dd></dl><div class="footer-actions"><a class="btn btn-success btn-editar btn btn-warning" th:href="@{/empresas/editar/{id}(id=${empresa.id})}">Editar</a><a class="btn btn-secondary" href="/empresas">Voltar</a></div></div></main>
    </section>
  </main>
</div>
</body>
</html>
