<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alunos | Moeda Estudantil</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <img src="/logo-sistema.svg" alt="Moeda Estudantil">
      <div><strong>MOEDA</strong><span>ESTUDANTIL</span></div>
    </div>

    <div class="menu-title">Principal</div>
    <a class="nav-link" href="/home">⌂ Dashboard</a>

    <div class="menu-title">Cadastros</div>
    <a class="nav-link active" href="/alunos">👥 Alunos</a>
    <a class="nav-link" href="/empresas">▦ Empresas Parceiras</a>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="round-menu">☰</div>
      <div class="user-area">
        <div class="user-profile">
          <span th:text="${session.usuarioLogado != null ? session.usuarioLogado.nomeExibicao : 'Administrador'}">Administrador</span>
          <a href="/logout" class="btn btn-secondary btn-sair">Sair</a>
        </div>
      </div>
    </header>

    <section class="content">
      <div class="page-header">
        <div class="page-icon">👥</div>
        <div>
          <h1>Alunos</h1>
          <div class="breadcrumb">Dashboard › <span>Alunos</span></div>
        </div>
      </div>
      <main class="page"><div class="card"><h1>Detalhe do aluno</h1><dl class="detail-list"><dt>Nome</dt><dd th:text="${aluno.nome}"></dd><dt>Email</dt><dd th:text="${aluno.email}"></dd><dt>CPF</dt><dd th:text="${aluno.cpf}"></dd><dt>RG</dt><dd th:text="${aluno.rg}"></dd><dt>Endereço</dt><dd th:text="${aluno.endereco}"></dd><dt>Instituição</dt><dd th:text="${aluno.instituicaoEnsino}"></dd><dt>Curso</dt><dd th:text="${aluno.curso}"></dd><dt>Saldo</dt><dd th:text="${aluno.saldoMoedas}"></dd><dt>Login</dt><dd th:text="${aluno.usuario.login}"></dd></dl><div class="footer-actions"><a class="btn btn-success btn-editar btn btn-warning" th:href="@{/alunos/editar/{id}(id=${aluno.id})}">Editar</a><a class="btn btn-secondary" href="/alunos">Voltar</a></div></div></main>
    </section>
  </main>
</div>
</body>
</html>
