<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Vantagem</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="app-shell"><aside class="sidebar"><div class="brand"><img src="/logo-sistema.svg"><div><strong>MOEDA</strong><span>ESTUDANTIL</span></div></div><a class="nav-link" href="/home">⌂ Dashboard</a><a class="nav-link active" href="/vantagens">★ Vantagens</a></aside><main class="main"><section class="content"><div class="page-header"><div class="page-icon">★</div><div><h1>Vantagem</h1><div class="breadcrumb">Dashboard › Vantagens › <span>Formulário</span></div></div></div><div class="card"><div th:if="${erro}" class="alert alert-error" th:text="${erro}"></div><form th:action="@{/vantagens/salvar}" th:object="${vantagem}" method="post"><input type="hidden" th:field="*{id}"><div class="form-grid"><div class="form-group"><label>Título</label><input th:field="*{titulo}" required></div><div class="form-group"><label>Empresa parceira</label><select name="empresaId" required><option value="">Selecione</option><option th:each="empresa : ${empresas}" th:value="${empresa.id}" th:selected="${vantagem.empresa != null && vantagem.empresa.id == empresa.id}" th:text="${empresa.nomeFantasia != null ? empresa.nomeFantasia : empresa.razaoSocial}"></option></select></div><div class="form-group"><label>Custo em moedas</label><input type="number" th:field="*{custoMoedas}" min="1" required></div><div class="form-group"><label>Foto do produto ou desconto (URL)</label><input th:field="*{fotoUrl}" placeholder="https://..."></div><div class="form-group"><label>Descrição</label><textarea th:field="*{descricao}" required></textarea></div></div><div class="form-actions"><button class="btn btn-primary" type="submit">Salvar</button><a href="/vantagens" class="btn btn-secondary">Voltar</a></div></form></div></section></main></div></body></html>
