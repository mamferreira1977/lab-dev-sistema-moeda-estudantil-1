<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Cupom</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="app-shell"><aside class="sidebar"><div class="brand"><img src="/logo-sistema.svg"><div><strong>MOEDA</strong><span>ESTUDANTIL</span></div></div><a class="nav-link" href="/home">⌂ Dashboard</a><a class="nav-link active" href="/resgates">▣ Resgates</a></aside><main class="main"><section class="content"><div class="page-header"><div class="page-icon">▣</div><div><h1>Cupom de Resgate</h1><div class="breadcrumb">Código para conferência presencial</div></div></div><div class="card"><div class="card-title" th:text="${resgate.codigo}">CUPOM-00000000</div><dl class="detail-list"><dt>Aluno</dt><dd th:text="${resgate.aluno.nome}"></dd><dt>Vantagem</dt><dd th:text="${resgate.vantagem.titulo}"></dd><dt>Empresa</dt><dd th:text="${resgate.vantagem.empresa.nomeFantasia != null ? resgate.vantagem.empresa.nomeFantasia : resgate.vantagem.empresa.razaoSocial}"></dd><dt>Custo</dt><dd th:text="${resgate.custoMoedas}"></dd><dt>Data</dt><dd th:text="${#temporals.format(resgate.dataHora, 'dd/MM/yyyy HH:mm')}"></dd></dl><p class="subtitle">E-mails simulados foram registrados para o aluno e para a empresa parceira com este código.</p><div class="footer-actions"><a href="/resgates" class="btn btn-secondary">Voltar</a></div></div></section></main></div></body></html>
