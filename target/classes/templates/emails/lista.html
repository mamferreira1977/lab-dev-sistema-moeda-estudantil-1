<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>E-mails Simulados</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="app-shell"><aside class="sidebar"><div class="brand"><img src="/logo-sistema.svg"><div><strong>MOEDA</strong><span>ESTUDANTIL</span></div></div><a class="nav-link" href="/home">⌂ Dashboard</a><a class="nav-link" href="/moedas/enviar">◎ Enviar Moedas</a><a class="nav-link" href="/resgates">▣ Resgates</a><a class="nav-link active" href="/emails-simulados">✉ E-mails Simulados</a></aside><main class="main"><section class="content"><div class="page-header"><div class="page-icon">✉</div><div><h1>E-mails Simulados</h1><div class="breadcrumb">Notificações registradas pelo sistema</div></div></div><div class="card"><div class="table-wrap"><table><thead><tr><th>Data</th><th>Destinatário</th><th>Assunto</th><th>Mensagem</th></tr></thead><tbody><tr th:each="email : ${emails}"><td th:text="${#temporals.format(email.dataHora, 'dd/MM/yyyy HH:mm')}">data</td><td th:text="${email.destinatario}">destinatario</td><td th:text="${email.assunto}">assunto</td><td th:text="${email.mensagem}">mensagem</td></tr><tr th:if="${emails == null || #lists.isEmpty(emails)}"><td colspan="4">Nenhum e-mail simulado registrado.</td></tr></tbody></table></div><div class="footer-actions"><a href="/home" class="btn btn-secondary">Voltar</a></div></div></section></main></div></body></html>
