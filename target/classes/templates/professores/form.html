<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Professor | Moeda Estudantil</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="app-shell"><aside class="sidebar"><div class="brand"><img src="/logo-sistema.svg" alt="Moeda Estudantil"><div><strong>MOEDA</strong><span>ESTUDANTIL</span></div></div><div class="menu-title">Principal</div><a class="nav-link" href="/home">⌂ Dashboard</a><div class="menu-title">Cadastros</div><a class="nav-link" href="/alunos">👥 Alunos</a><a class="nav-link" href="/empresas">▦ Empresas Parceiras</a><a class="nav-link active" href="/professores">👨‍🏫 Professores</a></aside><main class="main"><header class="topbar"><div class="round-menu">☰</div><div class="user-area"><div class="user-profile"><span th:text="${session.usuarioLogado != null ? session.usuarioLogado.nomeExibicao : 'Administrador'}">Administrador</span><a href="/logout" class="btn btn-secondary btn-sair">Sair</a></div></div></header><section class="content"><div class="page-header"><div class="page-icon">👨‍🏫</div><div><h1>Professor</h1><div class="breadcrumb">Dashboard › Professores › <span>Formulário</span></div></div></div><div class="card"><div th:if="${erro}" class="alert alert-error" th:text="${erro}"></div><form th:action="@{/professores/salvar}" th:object="${professor}" method="post"><input type="hidden" th:field="*{id}"><div class="form-grid"><div class="form-group"><label>Nome</label><input th:field="*{nome}" required></div><div class="form-group"><label>CPF</label><input th:field="*{cpf}" required></div><div class="form-group"><label>Departamento</label><input th:field="*{departamento}" required></div><div class="form-group"><label>E-mail</label><input type="email" th:field="*{email}" placeholder="email do professor" required></div><div class="form-group"><label>Instituição</label><input th:field="*{instituicao}" required></div><div class="form-group"><label>Saldo de moedas</label><input type="number" th:field="*{saldoMoedas}" min="0"></div><div class="form-group"><label>Login</label><input th:field="*{login}" placeholder="Padrão: e-mail"></div><div class="form-group"><label>Senha</label><input type="password" th:field="*{senha}" placeholder="Padrão: 123456"></div></div><div class="form-actions"><button class="btn btn-primary" type="submit">Salvar</button><a href="/professores" class="btn btn-secondary">Voltar</a></div></form></div></section></main></div></body></html>
