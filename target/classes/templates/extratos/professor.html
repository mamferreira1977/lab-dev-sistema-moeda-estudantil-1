<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Extrato do Professor</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="app-shell"><aside class="sidebar"><div class="brand"><img src="/logo-sistema.svg"><div><strong>MOEDA</strong><span>ESTUDANTIL</span></div></div><a class="nav-link" href="/home">⌂ Dashboard</a><a class="nav-link" href="/professores">👨‍🏫 Professores</a><a class="nav-link" href="/moedas/enviar">◎ Enviar Moedas</a></aside><main class="main"><section class="content"><div class="page-header"><div class="page-icon">◎</div><div><h1>Extrato do Professor</h1><div class="breadcrumb"><span th:text="${professor.nome}">Professor</span> › saldo: <span th:text="${professor.saldoMoedas}">0</span></div></div></div><div class="card"><div class="table-wrap"><table><thead><tr><th>Data</th><th>Tipo</th><th>Aluno</th><th>Quantidade</th><th>Motivo</th></tr></thead><tbody><tr th:each="t : ${transacoes}"><td th:text="${#temporals.format(t.dataHora, 'dd/MM/yyyy HH:mm')}">data</td><td th:text="${t.tipo}">tipo</td><td th:text="${t.aluno != null ? t.aluno.nome : '-'}">aluno</td><td th:text="${t.quantidade}">0</td><td th:text="${t.motivo}">motivo</td></tr><tr th:if="${transacoes == null || #lists.isEmpty(transacoes)}"><td colspan="5">Nenhuma transação registrada.</td></tr></tbody></table></div><div class="footer-actions"><a href="/professores" class="btn btn-secondary">Voltar</a></div></div></section></main></div></body></html>
